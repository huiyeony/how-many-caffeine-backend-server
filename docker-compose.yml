services:
  # 1. PostgreSQL (pgvector 포함) 서비스
  db:
    image: ankane/pgvector:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: caffeine_db
    ports:
      - "5433:5432" # 호스트(맥북)에서는 5432으로 접속 가능
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Ollama 서비스 (임베딩 및 추론) - OpenAI API 사용으로 전체 주석 처리
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # Entrypoint를 리스트 형식으로 작성하여 기본값을 완전히 덮어씁니다.
  #   entrypoint: >
  #     /bin/sh -c "
  #     ollama serve &
  #     sleep 15;
  #     ollama pull bge-m3:567m;
  #     ollama pull coolsoon/kanana-1.5-8b;
  #     wait
  #     "
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=-1

  # 3. 백엔드 API 서비스
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_server
    restart: always
    # db와 ollama가 먼저 준비된 후 api 실행
    depends_on:
      - db
      # - ollama # Ollama 의존성 주석 처리
    command: uvicorn api.v1.app:app --host 0.0.0.0 --port 8000 --reload
    # [수정 2] 볼륨 매핑 추가 (로컬 소스를 컨테이너에 실시간 동기화)
    volumes:
      - .:/app # 로컬의 backend 폴더를 컨테이너의 /app 폴더로 연결
    env_file:
      - .env.production
    environment:
      # 리스트 형식을 쓸 때는 '='를 사용해야 합니다.
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/caffeine_db
      # - OLLAMA_BASE_URL=http://ollama:11434 # 로컬 모델 URL 주석 처리
      - PYTHONUNBUFFERED=1

  # 4. Apache Superset (BI 대시보드)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  superset:
    image: apache/superset:latest
    container_name: superset
    restart: always
    depends_on:
      - db
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=howmanycaffeine-superset-secret-key
    volumes:
      - superset_home:/app/superset_home

volumes:
  postgres_data:
  ollama_data:
  superset_home:
