name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/howmanycaffeine
            git reset --hard origin/main
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Waiting for PostgreSQL to be ready..."
            until docker exec postgres_db pg_isready -U myuser -d caffeine_db; do
              sleep 3
            done
            echo "PostgreSQL is ready."
            docker exec backend_server python3 -c "from core.config import settings; import psycopg; conn = psycopg.connect(settings.database_url); print('direct psycopg connection OK'); conn.close()"
            docker exec backend_server python3 /app/tasks/run_pipeline.py
