name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/caffeine-backend

            cat > .env.production << EOF
            POSTGRES_HOST=db
            POSTGRES_PORT=5432
            POSTGRES_USER=myuser
            POSTGRES_PASSWORD=mypassword
            POSTGRES_DB=caffeine_db
            AWS_S3_BUCKET_NAME=howmanycaffeine-data-seoul
            AWS_REGION=ap-northeast-2
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}
            LANGSMITH_TRACING=true
            LANGSMITH_PROJECT=howmanycaffeine
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            FRONTEND_URL=https://www.howmanycaffeine.com
            REDIS_URL=redis://localhost:6379
            EOF

            git reset --hard origin/main
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Waiting for PostgreSQL container to exist..."
            until docker inspect postgres_db > /dev/null 2>&1; do
              sleep 3
            done
            echo "Waiting for PostgreSQL to be ready..."
            until docker exec postgres_db pg_isready -U myuser -d caffeine_db; do
              sleep 3
            done
            echo "PostgreSQL is ready."
            docker exec \
              -e AWS_S3_BUCKET_NAME=howmanycaffeine-data-seoul \
              -e AWS_REGION=ap-northeast-2 \
              backend_server python3 /app/tasks/run_pipeline.py
