name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/howmanycaffeine
            git reset --hard origin/main
            git pull origin main
            docker compose down
            docker compose up -d --build
            sleep 15
            docker exec backend_server ls /app/tasks/
            docker exec backend_server python3 /app/tasks/run_pipeline.py
