name: Deploy to EC2

on:
  push:
    branches: [main] # main 브랜치 push 시 자동 실행

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }} # EC2 IP
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }} # .pem 파일 내용
          script: |
            cd /home/ubuntu/howmanycaffeine
            git pull origin main
            docker compose down
            docker compose up -d --build
